spring.application.name=restaurante-rayocontrol-ga8-aa1-ev02
debug=false
server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/rayocontrol_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:colombia}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.pool-name=RayoControlPool
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.thymeleaf.cache=false

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.org.hibernate.orm.connections.pooling=WARN
